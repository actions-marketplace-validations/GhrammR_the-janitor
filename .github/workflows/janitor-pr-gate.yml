name: Janitor PR Gate

on:
  pull_request:
    branches:
      - main

# Workflow-level: deny all by default.
permissions: read-all

jobs:
  slop-gate:
    name: Structural Firewall
    runs-on: ubuntu-latest
    # Job-level: read PR diff + write step summary.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Dogfooding: run the composite action from the current branch so every
      # PR to this repo is itself gated by the version of the action it carries.
      - name: Janitor slop gate
        id: janitor
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_slop: 'true'

      - name: Upload bounce log
        # Always upload so reviewers can inspect findings even on gate failure.
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: janitor-bounce-log-pr-${{ github.event.pull_request.number }}
          path: .janitor/bounce_log.ndjson
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 30
