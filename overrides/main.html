{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <!--
    Content Security Policy — defence-in-depth for a static documentation site.

    Threat model: prevent injected <script> payloads from loading external code
    or exfiltrating data, should any content-injection path reach the rendered HTML.

    Directives:
      script-src 'self' 'unsafe-inline'  — mkdocs-material 9.x uses inline scripts
                                           for search configuration; 'self' blocks all
                                           external script sources.
      connect-src 'self'                 — blocks XHR/fetch data-exfiltration to
                                           foreign origins.
      frame-ancestors 'none'             — clickjacking prevention.
      base-uri 'self'                    — blocks <base href="…"> injection attacks.
      form-action 'none'                 — static docs site has no forms.
      worker-src blob:                   — mkdocs-material search uses blob: workers.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src  'self' 'unsafe-inline';
    style-src   'self' 'unsafe-inline';
    img-src     'self' data:;
    font-src    'self' data:;
    connect-src 'self';
    worker-src  blob:;
    frame-ancestors 'none';
    base-uri    'self';
    form-action 'none';
  ">
{% endblock %}
