# The Janitor Governance Manifest
# Loaded automatically by `janitor bounce` and `janitor scan`.
# See: https://thejanitor.app/governance (coming soon)
#
# All fields are optional. Defaults match the built-in engine constants.
# Unknown fields produce a warning and fall back to defaults.

# Composite slop-score threshold above which the PR gate fires.
# Default: 100. Raise for high-velocity repos; lower for safety-critical code.
min_slop_score = 100

# When true, any PR without a linked GitHub issue fails the gate unconditionally.
# Default: false.
require_issue_link = false

# When true, zombie-symbol re-introductions (verbatim body match to a previously
# deleted dead symbol) do not contribute to the score. Enable only during
# intentional symbol resurrection passes.
# Default: false.
allowed_zombies = false

# Reserved: post-quantum cryptography enforcement (not yet implemented).
# Default: false.
pqc_enforced = false

# Paths (relative to repo root) to custom .scm tree-sitter query files that
# define project-specific antipatterns. Each @slop capture = +50 to slop score.
# Default: [] (no custom queries).
custom_antipatterns = []

# Score reduction applied when a PR body contains [REFACTOR] or [FIXES-DEBT].
# The effective gate is raised by this amount for marked PRs only.
# Default: 0 (no Refactor Bonus).
refactor_bonus = 0
